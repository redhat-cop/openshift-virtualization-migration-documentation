[tool.semantic_release]
# Core settings
allow_zero_version = false
tag_format = "v{version}"
commit_message = "chore(release): v{version} [skip ci]\n\nAutomatically generated by python-semantic-release"

# AUTHOR CONFIGURATION
# Must be strictly "Name <email>"
commit_author = "github-actions <actions@users.noreply.github.com>"

# Version parsing logic
commit_parser = "conventional"
major_on_zero = true
no_git_verify = false
version_variables = [] 

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false

[tool.semantic_release.changelog]
exclude_commit_patterns = []
mode = "init"

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
output_format = "md"
mask_initial_release = false

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false

[tool.semantic_release.publish]
dist_glob_patterns = [] # No python distribution artifacts for a docs repo
upload_to_vcs_release = true